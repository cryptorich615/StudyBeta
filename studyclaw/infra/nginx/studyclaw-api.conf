server {
  listen 443 ssl;
  server_name api.studyclaw.com;
  ssl_certificate /etc/letsencrypt/live/api.studyclaw.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.studyclaw.com/privkey.pem;
  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
